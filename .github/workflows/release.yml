name: Cross-Platform Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # --------------------------------------------------------
  # Build Svelte (bun) and package frontend into Go embed
  # --------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Svelte UI
        working-directory: ui
        run: |
          bun install
          bun run build

      - name: Upload build folder
        uses: actions/upload-artifact@v7
        with:
          name: ui-build
          path: ui/build

  # --------------------------------------------------------
  # Cross-platform build matrix
  # --------------------------------------------------------
  build:
    needs: [frontend]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download UI build
        uses: actions/download-artifact@v8
        with:
          name: ui-build
          path: ui/build

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "go.sum"

      - name: Build and package binary
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi

          bin_name="sqlite-gui$ext"
          archive_name="sqlite-gui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o "$bin_name" ./cmd/sqlite-gui/main.go

          tar -czf "$archive_name" "$bin_name"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: sqlite-gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sqlite-gui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------
  # Release job (runs after all binaries finish)
  # --------------------------------------------------------
  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          prerelease: false
          files: |
            dist/**/sqlite-gui-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
